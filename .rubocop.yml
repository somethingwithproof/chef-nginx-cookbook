AllCops:
  Exclude:
    - 'vendor/**/*'
    - 'spec/fixtures/**/*'
    - 'tmp/**/*'
    - '.git/**/*'
    - 'bin/**/*'
    - 'Guardfile'
    - 'Policyfile.rb'
    - 'Policyfile.lock.json'
  NewCops: enable
  TargetRubyVersion: 3.0

Chef/Style/FileMode:
  Enabled: true

Chef/Modernize/LibarchiveFileResource:
  Enabled: true

Chef/Correctness/ChefApplicationFatal:
  Enabled: true

Chef/Correctness/InvalidPlatformMetadata:
  Enabled: true

Chef/Correctness/InvalidPlatformFamilyInCase:
  Enabled: true

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Max: 50
  Exclude:
    - 'spec/**/*'
    - 'test/**/*'
    - 'libraries/**/*'
    - 'resources/**/*'

Metrics/ClassLength:
  Max: 150

Metrics/CyclomaticComplexity:
  Max: 12

Metrics/MethodLength:
  Max: 40

Metrics/ModuleLength:
  Max: 150

Metrics/ParameterLists:
  Max: 7

Naming/FileName:
  Exclude:
    - 'libraries/**/*'
    - 'spec/**/*'
    - 'test/**/*'

Style/SingleLineBlockParams:
  Enabled: false

Style/NumericPredicate:
  EnforcedStyle: comparison

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: consistent_comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: consistent_comma

# Chef-specific rules
Chef/Modernize/DependsOnChefSpec:
  Enabled: true

Chef/Modernize/ExecuteAptUpdate:
  Enabled: true

Chef/Modernize/UnnecessaryDependsChef:
  Enabled: true

# FoodCritic is deprecated, using all Cookstyle cops instead
Chef/Modernize/UnnecessaryDependsChef:
  Enabled: true

Chef/Modernize/PowershellInstallWindowsFeature:
  Enabled: true

Chef/Modernize/OpensslX509Resource:
  Enabled: true

Chef/Modernize/WindowsRegistryUAC:
  Enabled: true

Chef/Modernize/ExecuteSleep:
  Enabled: true

Chef/Style/CommentFormat:
  Enabled: true

Chef/Style/CopyrightCommentFormat:
  Enabled: true

Chef/Style/DirectiveMode:
  Enabled: true

Chef/Style/TrueClassFalseClassResourceProperties:
  Enabled: true