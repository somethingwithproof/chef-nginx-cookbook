---
driver:
  name: vagrant
  customize:
    memory: 1024
    cpus: 2
  provider: virtualbox

provisioner:
  name: chef_zero
  product_name: chef
  product_version: 18
  chef_license: accept
  client_rb:
    chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  # Ubuntu platforms (LTS releases)
  - name: ubuntu-18.04
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  
  # Debian platforms
  - name: debian-10
  - name: debian-11
  
  # RHEL derivatives
  - name: centos-7
  - name: centos-stream-8
  - name: rockylinux-8
  - name: almalinux-9
  
  # Windows platforms
  - name: windows-2019
    transport:
      name: winrm
      elevated: true
  
  # macOS platforms
  - name: macos-11
    provider: parallels

suites:
  - name: default
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      nginx:
        default_site_enabled: true
        telemetry:
          enabled: false

  - name: ssl
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/ssl
    attributes:
      nginx:
        sites:
          secure.example.com:
            port: 80
            ssl_enabled: true
            ssl_port: 443
            ssl_cert: '/etc/ssl/certs/ssl-cert-snakeoil.pem'
            ssl_key: '/etc/ssl/private/ssl-cert-snakeoil.key'
            ssl_protocols: 'TLSv1.2 TLSv1.3'
            redirect_http_to_https: true
            root: '/var/www/secure.example.com'
    provisioner:
      client_rb:
        ssl_verify_mode: :verify_none
    excludes:
      - windows-2019
      - macos-11

  - name: multi-site
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/multi-site
    attributes:
      nginx:
        sites:
          site1.example.com:
            port: 80
            root: '/var/www/site1.example.com'
            server_name: 'site1.example.com'
          site2.example.com:
            port: 80
            root: '/var/www/site2.example.com'
            server_name: 'site2.example.com'
    provisioner:
      multiple_converge: 2
      enforce_idempotency: true
    excludes:
      - windows-2019
      - macos-11

  - name: performance-tuning
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/performance-tuning
    attributes:
      nginx:
        performance:
          worker_processes: 'auto'
          worker_connections: 4096
          worker_rlimit_nofile: 8192
          multi_accept: 'on'
          keepalive_timeout: 30
          keepalive_requests: 200
          sendfile: 'on'
          tcp_nopush: 'on'
          tcp_nodelay: 'on'
          open_file_cache: 'max=10000 inactive=30s'
          open_file_cache_valid: '60s'
          open_file_cache_min_uses: 2
          open_file_cache_errors: 'on'
          gzip: 'on'
          gzip_comp_level: 4
    excludes:
      - windows-2019
      - macos-11

  - name: modules
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/modules
    attributes:
      nginx:
        modules:
          status:
            module_name: 'status'
            configuration: |
              location /nginx_status {
                stub_status on;
                allow 127.0.0.1;
                deny all;
              }
          headers_more:
            module_name: 'headers-more-filter'
            install_package: true
            module_package_name: 'libnginx-mod-http-headers-more-filter'
    excludes:
      - windows-2019
      - macos-11