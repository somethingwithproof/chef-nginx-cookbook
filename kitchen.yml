---
driver:
  name: dokken
  privileged: true
  chef_version: "18"
  memory: 2048
  cpu: 2
  volumes:
    - /sys/fs/cgroup:/sys/fs/cgroup:rw
  tmpfs:
    - /tmp
    - /run
    - /run/lock

transport:
  name: dokken

provisioner:
  name: dokken
  chef_license: accept
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  log_level: info
  retry_on_exit_code:
    - 35 # Service restart might cause temporary failures
  max_retries: 2
  wait_for_retry: 120

verifier:
  name: inspec
  sudo: true
  reporter:
    - cli
    - junit:test/reports/%{platform}_%{suite}.xml

platforms:
  - name: ubuntu-20.04
    driver:
      image: dokken/ubuntu-20.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN apt-get install -y lsb-release curl gnupg2 systemd

  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN apt-get install -y lsb-release curl gnupg2 systemd ca-certificates

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN apt-get install -y lsb-release curl gnupg2 systemd ca-certificates

  - name: debian-11
    driver:
      image: dokken/debian-11
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN apt-get install -y lsb-release curl gnupg2 ca-certificates

  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN apt-get install -y lsb-release curl gnupg2 ca-certificates

  - name: rockylinux-8
    driver:
      image: dokken/rockylinux-8
      pid_one_command: /usr/lib/systemd/systemd
      intermediate_instructions:
        - RUN yum -y install initscripts systemd-sysv which lsof

  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd
      intermediate_instructions:
        - RUN yum -y install initscripts systemd-sysv which lsof

  - name: almalinux-8
    driver:
      image: dokken/almalinux-8
      pid_one_command: /usr/lib/systemd/systemd
      intermediate_instructions:
        - RUN yum -y install initscripts systemd-sysv which lsof

  - name: almalinux-9
    driver:
      image: dokken/almalinux-9
      pid_one_command: /usr/lib/systemd/systemd
      intermediate_instructions:
        - RUN yum -y install initscripts systemd-sysv which lsof

  - name: amazonlinux-2
    driver:
      image: dokken/amazonlinux-2
      pid_one_command: /usr/lib/systemd/systemd
      intermediate_instructions:
        - RUN yum -y install systemd-sysv initscripts shadow-utils

  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd
      intermediate_instructions:
        - RUN yum -y install systemd-sysv initscripts shadow-utils

suites:
  - name: default
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      nginx:
        default_site:
          enabled: true

  - name: ssl
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/ssl
    attributes:
      nginx:
        ssl:
          enabled: true
          certificate: /etc/pki/tls/certs/localhost.crt
          certificate_key: /etc/pki/tls/private/localhost.key
        default_site:
          enabled: true

  - name: multi-site
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/multi-site
    attributes:
      nginx:
        default_site:
          enabled: true
        sites:
          example:
            domain: example.com
            root: /var/www/example
            port: 8080
          secure:
            domain: secure.example.com
            root: /var/www/secure
            ssl_enabled: true
            ssl_cert: /etc/pki/tls/certs/localhost.crt
            ssl_key: /etc/pki/tls/private/localhost.key

  - name: modules
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/modules
    attributes:
      nginx:
        default_site:
          enabled: true
        modules:
          - http_proxy
          - http_ssl
          - http_stub_status

  - name: performance-tuning
    run_list:
      - recipe[nginx::default]
    verifier:
      inspec_tests:
        - test/integration/performance-tuning
    attributes:
      nginx:
        default_site:
          enabled: true
        performance:
          worker_processes: "auto"
          worker_connections: 1024
          open_file_cache_max: 1000
          open_file_cache_inactive: "20s"
          keepalive_timeout: 65
          client_max_body_size: "10m"
